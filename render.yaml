services:
  - type: web
    name: quizblitz-server
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: quizblitz-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: quizblitz-redis
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: quizblitz-db
    databaseName: quizblitz
    user: quizblitz

  - type: redis
    name: quizblitz-redis
    ipAllowList: [] # only allow internal connections
